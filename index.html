<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Twitter Feed - G2</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
    }

    /* ── Setup screen (phone UI) ───────────────────── */
    #setup {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      padding: 40px 24px 32px;
      max-width: 480px;
      margin: 0 auto;
    }

    #setup h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    #setup p.subtitle {
      font-size: 14px;
      color: #888;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    #setup label {
      display: block;
      font-size: 12px;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    #setup input {
      display: block;
      width: 100%;
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      font-family: monospace;
      padding: 12px 14px;
      margin-bottom: 20px;
      outline: none;
    }

    #setup input:focus {
      border-color: #555;
    }

    #setup .hint {
      font-size: 12px;
      color: #666;
      margin-top: -16px;
      margin-bottom: 20px;
    }

    #setup button {
      width: 100%;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      padding: 14px;
      margin-top: 8px;
      cursor: pointer;
    }

    #setup button:active {
      opacity: 0.8;
    }

    #setup .error {
      color: #f55;
      font-size: 13px;
      margin-top: 12px;
      text-align: center;
    }

    #setup .docs-link {
      margin-top: 24px;
      font-size: 12px;
      color: #555;
      text-align: center;
    }

    #setup .docs-link a {
      color: #888;
    }

    /* ── Glasses display (G2 UI) ───────────────────── */
    #glasses {
      display: none;
      width: 576px;
      height: 288px;
      overflow: hidden;
    }

    #app {
      width: 576px;
      height: 288px;
      display: flex;
      flex-direction: column;
      padding: 16px;
      overflow: hidden;
      font-family: monospace;
    }

    #header {
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: #aaa;
      padding-bottom: 6px;
      border-bottom: 1px solid #333;
    }

    #body {
      flex: 1;
      min-height: 0;
      padding-top: 6px;
      font-size: 14px;
      line-height: 1.4;
      overflow: hidden;
      word-break: break-word;
    }

    #footer {
      flex-shrink: 0;
      padding-top: 5px;
      font-size: 10px;
      color: #555;
      border-top: 1px solid #222;
    }
  </style>
</head>
<body>

  <!-- Phone setup screen -->
  <div id="setup">
    <h1>X for G2</h1>
    <p class="subtitle">
      Enter your X API credentials to connect your Twitter home timeline to your G2 glasses.
      These are stored only on your device.
    </p>

    <label>API Key (Consumer Key)</label>
    <input id="apiKey" type="password" autocomplete="off" spellcheck="false" />

    <label>API Secret (Consumer Secret)</label>
    <input id="apiSecret" type="password" autocomplete="off" spellcheck="false" />

    <label>Access Token</label>
    <input id="accessToken" type="password" autocomplete="off" spellcheck="false" />

    <label>Access Token Secret</label>
    <input id="accessSecret" type="password" autocomplete="off" spellcheck="false" />

    <button id="saveBtn">Connect</button>
    <div class="error" id="setupError"></div>

    <p class="docs-link">
      Get your keys at <a href="https://developer.twitter.com" target="_blank">developer.twitter.com</a>
    </p>
  </div>

  <!-- Glasses display (shown after setup) -->
  <div id="glasses">
    <div id="app">
      <div id="header">
        <span id="handle"></span>
        <span id="counter"></span>
      </div>
      <div id="body">Loading...</div>
      <div id="footer">^ scroll  |  v scroll  |  tap: next</div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
